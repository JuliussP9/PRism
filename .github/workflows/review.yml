name: PRism Code Review Bot

"on":
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    review:
            runs-on: ubuntu-latest

            steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Set up Python
                  uses: actions/setup-python@v4
                  with:
                    python-version: '3.11'

                - name: Run PRism bot
                  run: python bot/review.py